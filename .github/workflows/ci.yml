name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ADMIN_EMAIL: admin@example.com
      APPWRITE_API_KEY: ci-placeholder
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_APPWRITE_DATABASE_ID: volunteer_management
      NEXT_PUBLIC_APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
      NEXT_PUBLIC_APPWRITE_PROJECT_ID: ci-project
      NEXT_PUBLIC_APPWRITE_STORAGE_BUCKET_ID: ci-storage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build production app
        run: npm run build
